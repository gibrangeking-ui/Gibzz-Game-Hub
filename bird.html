<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gibzz Space Birds | 2D Physics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body {
            margin: 0; padding: 0; background: #090a0f; color: #fff;
            font-family: 'Orbitron', sans-serif; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }
        h1 { font-size: 1.5rem; color: #00f2ff; text-shadow: 0 0 10px #00f2ff; margin: 10px 0; }
        #game-container {
            position: relative; border: 2px solid #00f2ff; border-radius: 15px;
            overflow: hidden; background: #111; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }
        .instructions { font-size: 0.8rem; color: #aaa; margin: 5px; text-align: center; }
        button {
            margin-top: 10px; background: #e94560; border: none; color: white;
            padding: 10px 20px; font-family: 'Orbitron'; cursor: pointer; border-radius: 5px;
        }
    </style>
</head>
<body>

<h1>GIBZZ SPACE BIRDS</h1>
<div class="instructions">Tarik burung merah dan lepaskan untuk menumbangkan menara!</div>
<div id="game-container"></div>
<button onclick="location.reload()">Reset Tahap</button>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint, Constraint, Events } = Matter;

    // 1. Setup Enjin Fizik
    const engine = Engine.create();
    const world = engine.world;

    // 2. Setup Paparan (Render)
    const container = document.getElementById('game-container');
    const w = window.innerWidth > 600 ? 600 : window.innerWidth - 20;
    const h = 400;

    const render = Render.create({
        element: container,
        engine: engine,
        options: {
            width: w,
            height: h,
            wireframes: false,
            background: 'transparent'
        }
    });

    Render.run(render);
    const runner = Runner.create();
    Runner.run(runner, engine);

    // 3. Objek Tanah
    const ground = Bodies.rectangle(w/2, h, w*2, 60, { isStatic: true, render: { fillStyle: '#2ecc71' } });
    Composite.add(world, ground);

    // 4. Burung (Peluru)
    let bird = Bodies.circle(150, 250, 15, { 
        density: 0.004, 
        render: { fillStyle: '#e74c3c' } 
    });

    // 5. Lastik (Sling)
    const anchor = { x: 150, y: 250 };
    const elastic = Constraint.create({
        pointA: anchor,
        bodyB: bird,
        stiffness: 0.05,
        render: { strokeStyle: '#fff', lineWidth: 2 }
    });

    // 6. Menara Sasaran (Warna-warni)
    const colors = ['#f1c40f', '#e67e22', '#3498db', '#9b59b6'];
    for (let r = 0; r < 5; r++) {
        for (let c = 0; c < 3; c++) {
            const box = Bodies.rectangle(w - 150 + (c * 35), h - 50 - (r * 45), 30, 40, {
                render: { fillStyle: colors[r % colors.length] }
            });
            Composite.add(world, box);
        }
    }

    Composite.add(world, [bird, elastic]);

    // 7. Kawalan Mouse/Sentuhan
    const mouse = Mouse.create(render.canvas);
    const mouseConstraint = MouseConstraint.create(engine, {
        mouse: mouse,
        constraint: { stiffness: 0.2, render: { visible: false } }
    });

    Composite.add(world, mouseConstraint);
    render.mouse = mouse;

    // 8. Logik Pelepasan (Sling Logic)
    Events.on(mouseConstraint, 'enddrag', function(event) {
        if (event.body === bird) {
            // Tunggu sekejap sebelum putuskan tali elastik
            setTimeout(() => {
                elastic.bodyB = null;
                elastic.render.visible = false;
            }, 20);

            // Munculkan burung baru selepas 3 saat
            setTimeout(() => {
                bird = Bodies.circle(150, 250, 15, { density: 0.004, render: { fillStyle: '#e74c3c' } });
                Composite.add(world, bird);
                elastic.bodyB = bird;
                elastic.render.visible = true;
            }, 3000);
        }
    });

    // Sesuaikan saiz untuk Mobile
    render.canvas.style.width = "100%";
    render.canvas.style.height = "auto";
</script>

</body>
</html>
