<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gibzz Game Hub | Space Arcade</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Efek Bintang Bergerak */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.5;
            animation: moveStars 100s linear infinite;
        }

        @keyframes moveStars {
            from { background-position: 0 0; }
            to { background-position: 10000px 5000px; }
        }

        h1 {
            font-size: 3rem;
            color: #00f2ff;
            text-shadow: 0 0 20px #00f2ff, 0 0 40px #0062ff;
            margin-top: 30px;
            letter-spacing: 5px;
        }

        .arcade-container {
            background: rgba(15, 52, 96, 0.4);
            border: 4px solid #00f2ff;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(10px);
            max-width: 90%;
        }

        .menu {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            background: transparent;
            border: 2px solid #e94560;
            color: #e94560;
            padding: 10px 20px;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        button:hover {
            background: #e94560;
            color: white;
            box-shadow: 0 0 15px #e94560;
        }

        button.active {
            background: #00f2ff;
            border-color: #00f2ff;
            color: #090a0f;
            box-shadow: 0 0 20px #00f2ff;
        }

        canvas {
            background: #000;
            border: 2px solid #555;
            display: block;
            margin: 0 auto;
            max-width: 100%;
            image-rendering: pixelated;
        }

        #gameInfo {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #aaa;
        }

        .score-board {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #f1c40f;
        }
    </style>
</head>
<body>

<div class="stars"></div>

<h1>GIBZZ GAME HUB</h1>

<div class="arcade-container">
    <div class="menu" id="gameButtons">
        <button onclick="changeGame('snake', this)" class="active">Space Snake</button>
        <button onclick="changeGame('pingpong', this)">Galaxy Pong</button>
        <button onclick="changeGame('dodge', this)">Asteroid Dodge</button>
        <button onclick="changeGame('clicker', this)">Star Clicker</button>
        <button onclick="changeGame('catch', this)">Moon Catcher</button>
    </div>

    <div class="score-board">Score: <span id="currentScore">0</span></div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <div id="gameInfo">Pilih game di atas untuk memulai misi!</div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("currentScore");
    const infoEl = document.getElementById("gameInfo");
    let loop = null;
    let score = 0;

    // Reset Game
    function reset(msg) {
        if(loop) clearInterval(loop);
        score = 0;
        scoreEl.innerText = score;
        infoEl.innerText = msg;
    }

    function changeGame(type, btn) {
        // Update Button Style
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        if(type === 'snake') startSnake();
        if(type === 'pingpong') startPingPong();
        if(type === 'dodge') startDodge();
        if(type === 'clicker') startClicker();
        if(type === 'catch') startCatch();
    }

    // 1. SPACE SNAKE
    function startSnake() {
        reset("Gunakan Panah Keyboard untuk mengendalikan Ular Galaksi!");
        let box = 20, snake = [{x: 10*box, y: 10*box}], food = {x: 40, y: 40}, d = "RIGHT";
        document.onkeydown = (e) => {
            if(e.key == "ArrowLeft" && d != "RIGHT") d = "LEFT";
            if(e.key == "ArrowUp" && d != "DOWN") d = "UP";
            if(e.key == "ArrowRight" && d != "LEFT") d = "RIGHT";
            if(e.key == "ArrowDown" && d != "UP") d = "DOWN";
        };
        loop = setInterval(() => {
            let head = {x: snake[0].x, y: snake[0].y};
            if(d=="LEFT") head.x-=box; if(d=="UP") head.y-=box; if(d=="RIGHT") head.x+=box; if(d=="DOWN") head.y+=box;
            if(head.x==food.x && head.y==food.y) {
                score++; scoreEl.innerText = score;
                food={x:Math.floor(Math.random()*19)*20, y:Math.floor(Math.random()*19)*20};
            } else { snake.pop(); }
            if(head.x<0 || head.x>=400 || head.y<0 || head.y>=400 || snake.some(s=>s.x==head.x&&s.y==head.y)) return startSnake();
            snake.unshift(head);
            ctx.fillStyle="#000"; ctx.fillRect(0,0,400,400);
            ctx.fillStyle="#00f2ff"; snake.forEach(s => ctx.fillRect(s.x, s.y, box-2, box-2));
            ctx.fillStyle="#e94560"; ctx.beginPath(); ctx.arc(food.x+10, food.y+10, 8, 0, Math.PI*2); ctx.fill();
        }, 100);
    }

    // 2. GALAXY PONG
    function startPingPong() {
        reset("Gunakan Panah Atas & Bawah untuk menjaga gerbang bintang!");
        let p1=150, b={x:200, y:200, dx:4, dy:4};
        document.onkeydown = (e) => { if(e.key=="ArrowUp" && p1>0) p1-=30; if(e.key=="ArrowDown" && p1<320) p1+=30; };
        loop = setInterval(() => {
            b.x+=b.dx; b.y+=b.dy;
            if(b.y<0 || b.y>390) b.dy*=-1;
            if(b.x<20 && b.y>p1 && b.y<p1+80) { b.dx*=-1.1; score++; scoreEl.innerText = score; }
            if(b.x>380) b.dx*=-1;
            if(b.x<0) return startPingPong();
            ctx.fillStyle="#000"; ctx.fillRect(0,0,400,400);
            ctx.fillStyle="#00f2ff"; ctx.fillRect(10, p1, 10, 80);
            ctx.fillStyle="#fff"; ctx.shadowBlur = 10; ctx.shadowColor = "white";
            ctx.fillRect(b.x, b.y, 10, 10); ctx.shadowBlur = 0;
        }, 30);
    }

    // 3. ASTEROID DODGE
    function startDodge() {
        reset("Hindari Asteroid Merah yang jatuh!");
        let px=180, obs=[];
        document.onkeydown = (e) => { if(e.key=="ArrowLeft" && px>0) px-=25; if(e.key=="ArrowRight" && px<360) px+=25; };
        loop = setInterval(() => {
            if(Math.random()<0.08) obs.push({x: Math.random()*380, y: -20});
            ctx.fillStyle="#000"; ctx.fillRect(0,0,400,400);
            ctx.fillStyle="#00f2ff"; ctx.fillRect(px, 370, 40, 20); // Player
            ctx.fillStyle="#e94560";
            obs.forEach((o, i) => {
                o.y+=5; ctx.fillRect(o.x, o.y, 20, 20);
                if(o.y>370 && o.x>px-20 && o.x<px+40) return startDodge();
                if(o.y > 400) { obs.splice(i,1); score++; scoreEl.innerText = score; }
            });
        }, 30);
    }

    // 4. STAR CLICKER
    function startClicker() {
        reset("Klik Bintang yang muncul secepat mungkin!");
        let star = {x: 200, y: 200};
        canvas.onclick = (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            if(mx > star.x && mx < star.x+40 && my > star.y && my < star.y+40) {
                score++; scoreEl.innerText = score;
                star = {x: Math.random()*350, y: Math.random()*350};
            }
        };
        loop = setInterval(() => {
            ctx.fillStyle="#000"; ctx.fillRect(0,0,400,400);
            ctx.fillStyle="#f1c40f"; ctx.shadowBlur = 20; ctx.shadowColor = "yellow";
            ctx.fillRect(star.x, star.y, 40, 40); ctx.shadowBlur = 0;
        }, 100);
    }

    // 5. MOON CATCHER
    function startCatch() {
        reset("Tangkap koin bintang dengan kapal birumu!");
        let px=175, coin={x:200, y:0};
        canvas.onmousemove = (e) => { 
            const rect = canvas.getBoundingClientRect();
            px = (e.clientX - rect.left) - 25; 
        };
        loop = setInterval(() => {
            coin.y+=6;
            if(coin.y>400) { coin={x:Math.random()*380, y:0}; }
            if(coin.y>360 && coin.x>px && coin.x<px+50) { 
                score++; scoreEl.innerText = score; 
                coin={x:Math.random()*380, y:0}; 
            }
            ctx.fillStyle="#000"; ctx.fillRect(0,0,400,400);
            ctx.fillStyle="#f1c40f"; ctx.beginPath(); ctx.arc(coin.x, coin.y, 10, 0, Math.PI*2); ctx.fill(); // Coin
            ctx.fillStyle="#00f2ff"; ctx.fillRect(px, 380, 50, 10); // Player
        }, 20);
    }

    // Start default game
    startSnake();
</script>

</body>
  </html>
